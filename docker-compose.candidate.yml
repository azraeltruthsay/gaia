# GAIA Candidate Stack - High Availability & Testing
# 
# This file defines the "Candidate" versions of GAIA services.
# Used for testing new code in parallel with production.

services:
  # ═══════════════════════════════════════════════════════════════════════════
  # gaia-core-candidate: The Brain
  # ═══════════════════════════════════════════════════════════════════════════
  gaia-core-candidate:
    build:
      context: .
      dockerfile: ./candidates/gaia-core/Dockerfile
    image: localhost:5000/gaia-core-candidate:local
    container_name: gaia-core-candidate
    hostname: gaia-core-candidate
    restart: "no"
    user: "${UID:-1000}:${GID:-1000}"
    
    volumes:
      - ./candidates/gaia-core:/app:rw
      - ./candidates/gaia-common:/gaia-common:ro
      - ./knowledge:/knowledge:ro
      - ./gaia-models:/models:ro
      - gaia-candidate-shared:/shared:rw
      - ./logs:/logs:rw

    environment:
      - PYTHONPATH=/app:/gaia-common
      - GAIA_ENV=development
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CORE_ENDPOINT=http://gaia-core-candidate:6415
      - MCP_ENDPOINT=http://gaia-mcp-candidate:8765/jsonrpc
      - PRIME_ENDPOINT=http://gaia-prime:7777/v1
      - GAIA_AUTOLOAD_MODELS=1
    
    deploy:
      resources:
        limits:
          memory: 8G

    command: ["python", "-m", "uvicorn", "gaia_core.main:app", "--host", "0.0.0.0", "--port", "6415", "--reload", "--reload-dir", "/app/gaia_core", "--reload-exclude", "knowledge/*"]

    ports:
      - "6416:6415"
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6415/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ═══════════════════════════════════════════════════════════════════════════
  # gaia-web-candidate: The Face
  # ═══════════════════════════════════════════════════════════════════════════
  gaia-web-candidate:
    build:
      context: .
      dockerfile: ./candidates/gaia-web/Dockerfile
    image: localhost:5000/gaia-web-candidate:local
    container_name: gaia-web-candidate
    hostname: gaia-web-candidate
    restart: "no"
    user: "${UID:-1000}:${GID:-1000}"

    volumes:
      - ./candidates/gaia-web:/app:rw
      - ./candidates/gaia-common:/gaia-common:ro
      - ./knowledge:/knowledge:ro
      - ./logs:/logs:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro

    environment:
      - PYTHONPATH=/app:/gaia-common
      - GAIA_SERVICE=web
      - GAIA_ENV=development
      - CORE_ENDPOINT=http://gaia-core-candidate:6415
      - MCP_ENDPOINT=http://gaia-mcp-candidate:8765/jsonrpc
      - HOST=0.0.0.0
      - PORT=6414
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENABLE_DISCORD=0 # Disable discord in candidate to avoid duplicate bots

    deploy:
      resources:
        limits:
          memory: 2G

    ports:
      - "6417:6414"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6414/health"]
      interval: 30s
      timeout: 10s
      retries: 3

    command: ["python", "-m", "uvicorn", "gaia_web.main:app", "--host", "0.0.0.0", "--port", "6414"]

  # ═══════════════════════════════════════════════════════════════════════════
  # gaia-mcp-candidate: The Hands
  # ═══════════════════════════════════════════════════════════════════════════
  gaia-mcp-candidate:
    build:
      context: .
      dockerfile: ./candidates/gaia-mcp/Dockerfile
    image: localhost:5000/gaia-mcp-candidate:local
    container_name: gaia-mcp-candidate
    hostname: gaia-mcp-candidate
    restart: "no"
    user: "${UID:-1000}:${GID:-1000}"

    environment:
      - PYTHONPATH=/app:/app/gaia-common
      - GAIA_ENV=development
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - GAIA_SERVICE=mcp

    volumes:
      - ./candidates/gaia-mcp:/app:rw
      - ./candidates/gaia-common:/app/gaia-common:ro
      - ./knowledge:/knowledge:rw
      - ./gaia-models:/models:ro
      - gaia-candidate-sandbox:/sandbox:rw
      - gaia-candidate-shared:/shared:rw
      - ./logs:/logs:rw

    deploy:
      resources:
        limits:
          memory: 2G

    ports:
      - "8767:8765"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health"]
      interval: 15s
      timeout: 10s
      retries: 3

    command: ["python", "-m", "uvicorn", "gaia_mcp.main:app", "--host", "0.0.0.0", "--port", "8765"]

  # ═══════════════════════════════════════════════════════════════════════════
  # gaia-prime-candidate: The Voice (pre-built vLLM image for Qwen3.5 testing)
  # ═══════════════════════════════════════════════════════════════════════════
  gaia-prime-candidate:
    build:
      context: .
      dockerfile: ./candidates/gaia-prime/Dockerfile
    image: localhost:5000/gaia-prime-candidate:local
    container_name: gaia-prime-candidate
    hostname: gaia-prime-candidate
    restart: "no"

    volumes:
      - ./gaia-models:/models:ro
      - ./logs/kvcache/prime:/kvcache:rw
      - ./candidates/gaia-prime/lmcache_config.yaml:/etc/lmcache/config.yaml:ro

    environment:
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - LMCACHE_CONFIG_FILE=/etc/lmcache/config.yaml

    ports:
      - "7778:7777"

    # LMCache KV persistence: blocked by vLLM 0.17 + Qwen3.5 hybrid arch.
    # LMCacheConnectorV1 doesn't implement SupportsHMA, so:
    #   - With HMA disabled: "failed to convert hybrid KV cache specs to one unified type"
    #   - With HMA enabled:  "Connector LMCacheConnectorV1 does not support HMA"
    # When LMCache ships HMA support, add to command block:
    #   --kv-transfer-config '{"kv_connector":"LMCacheConnectorV1","kv_role":"kv_both"}'
    # Config, volume, and env var are already wired — just needs this flag.
    command: >
      python -m vllm.entrypoints.openai.api_server
      --model /models/Qwen3.5-4B-Abliterated
      --host 0.0.0.0
      --port 7777
      --gpu-memory-utilization 0.65
      --max-model-len 24576
      --max-num-seqs 1
      --trust-remote-code
      --dtype auto
      --enforce-eager
      --quantization fp8
      --enable-prefix-caching

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7777/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  gaia-candidate-shared:
  gaia-candidate-sandbox:

networks:
  default:
    name: gaia-network
    external: true
