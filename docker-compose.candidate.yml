# GAIA Candidate Stack - High Availability & Testing
# 
# This file defines the "Candidate" versions of GAIA services.
# Used for testing new code in parallel with production.

services:
  # ═══════════════════════════════════════════════════════════════════════════
  # gaia-core-candidate: The Brain (GPU-capable for testing & training)
  # ═══════════════════════════════════════════════════════════════════════════
  gaia-core-candidate:
    build:
      context: .
      dockerfile: ./candidates/gaia-core/Dockerfile.candidate
    image: localhost:5000/gaia-core-candidate:cuda
    container_name: gaia-core-candidate
    hostname: gaia-core-candidate
    restart: "no"
    user: "${UID:-1000}:${GID:-1000}"

    volumes:
      - ./candidates/gaia-core:/app:rw
      - ./candidates/gaia-common:/gaia-common:ro
      - ../gaia-instance/knowledge:/knowledge:ro
      - ./knowledge/blueprints:/knowledge/blueprints:ro
      - ./knowledge/system_reference:/knowledge/system_reference:ro
      - ./knowledge/personas:/knowledge/personas:ro
      - ./knowledge/penpal:/knowledge/penpal:rw
      - ../gaia-instance/gaia-models:/models:rw
      - gaia-candidate-shared:/shared:rw
      - ../gaia-instance/logs:/logs:rw

    environment:
      - PYTHONPATH=/app:/gaia-common
      - GAIA_ENV=development
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CORE_ENDPOINT=http://gaia-core-candidate:6415
      - MCP_ENDPOINT=http://gaia-mcp-candidate:8765/jsonrpc
      - PRIME_ENDPOINT=${PRIME_ENDPOINT:-http://gaia-prime-candidate:7777}
      # Disable sleep and background heartbeats in candidate to avoid waking GPU
      - SLEEP_ENABLED=False
      - HEARTBEAT_ENABLED=False
      # Tracks the live /models/prime symlink — was hardcoded to an
      # abandoned Huihui-Qwen3-8B abliteration experiment that no longer
      # exists on disk (GAIA_Project-74v).
      - PRIME_MODEL=${PRIME_MODEL:-/models/prime}
      # Candidate Core: safetensors primary (GPU), GGUF fallback (CPU).
      # Tracks the same live /models/core{,.gguf} symlinks as production
      # (promotion pipeline repoints these) — was hardcoded to the retired
      # Qwen3.5-2B generation, which no longer exists on disk, so the
      # embedded engine silently never started (GAIA_Project-jov).
      - CORE_SAFETENSORS_PATH=${CORE_SAFETENSORS_PATH:-/models/core}
      - CORE_CPU_MODEL_PATH=/models/core.gguf
      # 85mb: HA mirror is CPU-pinned — single-GPU-holder doctrine. GPU-path
      # candidate testing = set CANDIDATE_CORE_DEVICE=cuda + gearbox engage.
      - CORE_DEVICE=${CANDIDATE_CORE_DEVICE:-cpu}
      - CORE_CPU_CTX=16384
      - CORE_CPU_THREADS=8
      - CORE_CPU_SLOT_SAVE_PATH=/shared/kvcache/core
      - SHARED_DIR=/shared
      - N_GPU_LAYERS=${CANDIDATE_CORE_GPU_LAYERS:-0}
      - GAIA_AUTOLOAD_MODELS=1
      # Parity with production gaia-core: operator timezone + Locality organ
      # (place + live open-meteo weather in the [Here & Now] block). Without
      # these the HA mirror renders UTC and no place. Values come from .env.
      - GAIA_USER_TZ=${GAIA_USER_TZ:-America/Los_Angeles}
      - GAIA_LOCALE_CITY=${GAIA_LOCALE_CITY:-}
      - GAIA_LOCALE_LAT=${GAIA_LOCALE_LAT:-}
      - GAIA_LOCALE_LON=${GAIA_LOCALE_LON:-}

    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    ports:
      - "6416:6415"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6415/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ═══════════════════════════════════════════════════════════════════════════
  # gaia-web-candidate: The Face
  # ═══════════════════════════════════════════════════════════════════════════
  gaia-web-candidate:
    build:
      context: .
      dockerfile: ./candidates/gaia-web/Dockerfile
    image: localhost:5000/gaia-web-candidate:local
    container_name: gaia-web-candidate
    hostname: gaia-web-candidate
    restart: "no"
    user: "${UID:-1000}:${GID:-1000}"

    volumes:
      - ./candidates/gaia-web:/app:rw
      - ./candidates/gaia-common:/gaia-common:ro
      - ../gaia-instance/knowledge:/knowledge:ro
      - ./knowledge/blueprints:/knowledge/blueprints:ro
      - ./knowledge/system_reference:/knowledge/system_reference:ro
      - ./knowledge/personas:/knowledge/personas:ro
      - ./knowledge/penpal:/knowledge/penpal:rw
      - ../gaia-instance/logs:/logs:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro

    environment:
      - PYTHONPATH=/app:/gaia-common
      - GAIA_SERVICE=web
      - GAIA_ENV=development
      - CORE_ENDPOINT=http://gaia-core-candidate:6415
      - MCP_ENDPOINT=http://gaia-mcp-candidate:8765/jsonrpc
      - HOST=0.0.0.0
      - PORT=6414
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENABLE_DISCORD=0 # Disable discord in candidate to avoid duplicate bots

    deploy:
      resources:
        limits:
          memory: 2G

    ports:
      - "6417:6414"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6414/health"]
      interval: 30s
      timeout: 10s
      retries: 3

    command: ["python", "-m", "uvicorn", "gaia_web.main:app", "--host", "0.0.0.0", "--port", "6414"]

  # ═══════════════════════════════════════════════════════════════════════════
  # gaia-mcp-candidate: The Hands
  # ═══════════════════════════════════════════════════════════════════════════
  gaia-mcp-candidate:
    build:
      context: .
      dockerfile: ./candidates/gaia-mcp/Dockerfile
    image: localhost:5000/gaia-mcp-candidate:local
    container_name: gaia-mcp-candidate
    hostname: gaia-mcp-candidate
    restart: "no"
    user: "${UID:-1000}:${GID:-1000}"

    environment:
      - PYTHONPATH=/app:/app/gaia-common
      - GAIA_ENV=development
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - GAIA_SERVICE=mcp

    volumes:
      - ./candidates/gaia-mcp:/app:rw
      - ./candidates/gaia-common:/app/gaia-common:ro
      - ../gaia-instance/knowledge:/knowledge:rw
      - ./knowledge/blueprints:/knowledge/blueprints:ro
      - ./knowledge/system_reference:/knowledge/system_reference:ro
      - ./knowledge/personas:/knowledge/personas:ro
      - ./knowledge/penpal:/knowledge/penpal:rw
      - ../gaia-instance/gaia-models:/models:ro
      - gaia-candidate-sandbox:/sandbox:rw
      - gaia-candidate-shared:/shared:rw
      - ../gaia-instance/logs:/logs:rw

    deploy:
      resources:
        limits:
          memory: 2G

    ports:
      - "8767:8765"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health"]
      interval: 15s
      timeout: 10s
      retries: 3

    command: ["python", "-m", "uvicorn", "gaia_mcp.main:app", "--host", "0.0.0.0", "--port", "8765"]

  # ═══════════════════════════════════════════════════════════════════════════
  # gaia-prime-candidate: The Voice (pre-built vLLM image for Qwen3.5 testing)
  # ═══════════════════════════════════════════════════════════════════════════
  gaia-prime-candidate:
    build:
      # Context must be this service's own directory, not the project root:
      # the Dockerfile's `COPY patch_float8.sh cmake_wrapper.sh /app/` and
      # the co-located .dockerignore (which allow-lists exactly those two
      # files) both assume it. Was `context: .` — `docker compose build`
      # for this service had likely never worked; the stale pre-lmcache
      # image was built by running `docker build` manually from inside
      # candidates/gaia-prime/, bypassing compose. (GAIA_Project-foh)
      context: ./candidates/gaia-prime
      dockerfile: Dockerfile
    image: localhost:5000/gaia-prime-candidate:local
    container_name: gaia-prime-candidate
    hostname: gaia-prime-candidate
    restart: "no"

    volumes:
      - ../gaia-instance/gaia-models:/models:ro
      - ../gaia-instance/logs/kvcache/prime:/kvcache:rw
      - ./candidates/gaia-prime/lmcache_config.yaml:/etc/lmcache/config.yaml:ro

    environment:
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - LMCACHE_CONFIG_FILE=/etc/lmcache/config.yaml
      # Load peak sits within ~200MB of OOM alongside live production
      # (~3GB resident floor); expandable segments buy back fragmentation slack.
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      # Deterministic token hashing across restarts — without this, Python's
      # per-process hash randomization gives every boot a fresh key space and
      # LMCache's disk tier can never be re-hit (see lmcache_config.yaml note).
      - PYTHONHASHSEED=0

    ports:
      - "7778:7777"

    # LMCache KV persistence (GAIA_Project-foh, verified working 2026-07-03):
    # the old "blocked by HMA" note was written for a PRIOR Prime model with a
    # genuinely hybrid (mamba/SWA) architecture; current Prime
    # (Qwen3-VL-8B-GAIA-Prime-v1-abliterated) is a standard GQA transformer
    # (1 KV-cache group) and never touches vLLM's SupportsHMA gate.
    #
    # Three hard-won facts about THIS command block (full trail in bead foh):
    #
    # 1. MODEL PATH is the *-tf4shadow dir, NOT /models/prime. The real model
    #    dir's tokenizer_config.json carries a transformers-5-style
    #    `extra_special_tokens` flat list that crashes the transformers 4.57.6
    #    this image now pins (vLLM 0.15 cannot run VL models under
    #    transformers 5 — see candidates/gaia-prime/Dockerfile). The shadow
    #    dir is symlinks to the real model dir + one patched
    #    tokenizer_config.json (key removed; the tokens still load from
    #    tokenizer.json). Production model files are untouched. Recreate by
    #    symlinking every file except tokenizer_config.json and writing a
    #    copy of it with the `extra_special_tokens` key deleted.
    #    --served-model-name keeps the client-visible model id stable.
    #    NOTE: LMCache keys chunks by the --model path — changing it
    #    invalidates the persisted cache.
    #
    # 2. NO --quantization fp8: vLLM 0.15's *online* fp8 quantization
    #    re-materializes quantized weights on GPU, silently defeating
    #    --cpu-offload-gb (measured: identical ~12.3GiB load peak at offload
    #    5/7/10 with fp8; behaves as expected without it). The current bf16
    #    checkpoint (~16.4GB; fp8 leaves embed/lm_head/vision unquantized
    #    anyway) cannot fit a 16GB card that also hosts production's ~3GB
    #    resident floor, so weights are offloaded instead: 10GB pinned-CPU
    #    via UVA, ~6.5GB on GPU, 1.9GiB KV (13,872 tokens). Slow (~30s
    #    prefill for 3.4k tokens, ~4s/token decode) but functional — and
    #    prefill is exactly what LMCache short-circuits. The old
    #    0.65-util/24576-ctx/fp8 config was tuned for the retired quantized
    #    Qwen3.5 checkpoint and never re-validated after the model migration.
    #
    # 3. Restart-surviving persistence needs BOTH the sha256 chunk hashing +
    #    PYTHONHASHSEED (above) AND the fs:// remote backend instead of
    #    local_disk — local_disk's key index lives only in process memory, so
    #    its files are unreachable after a restart. Full rationale in
    #    candidates/gaia-prime/lmcache_config.yaml; verification trail +
    #    restart-and-reuse test results in bead foh.
    command: >
      python -m vllm.entrypoints.openai.api_server
      --model /models/Qwen3-VL-8B-GAIA-Prime-v1-abliterated-tf4shadow
      --served-model-name /models/prime
      --host 0.0.0.0
      --port 7777
      --gpu-memory-utilization 0.70
      --max-model-len 8192
      --max-num-seqs 1
      --trust-remote-code
      --dtype auto
      --enforce-eager
      --cpu-offload-gb 10
      --enable-prefix-caching
      --kv-transfer-config '{"kv_connector":"LMCacheConnectorV1","kv_role":"kv_both"}'

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7777/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ═══════════════════════════════════════════════════════════════════════════
  # gaia-study-candidate: The Subconscious (upgraded PyTorch for RTX 5080)
  # Used for QLoRA training on 8B+ models with native sm_120 CUDA support.
  # ═══════════════════════════════════════════════════════════════════════════
  gaia-study-candidate:
    build:
      context: .
      dockerfile: ./gaia-study/Dockerfile
    image: gaia-study-candidate:pytorch210
    container_name: gaia-study-candidate
    hostname: gaia-study-candidate
    restart: "no"
    user: "${UID:-1000}:${GID:-1000}"

    volumes:
      - ./gaia-study:/app:rw
      - ./scripts:/app/scripts:ro
      - ./knowledge/curricula:/gaia/GAIA_Project/knowledge/curricula:ro
      - ./gaia-common:/gaia-common:ro
      - ../gaia-instance/knowledge:/knowledge:rw
      - ./knowledge/blueprints:/knowledge/blueprints:ro
      - ./knowledge/system_reference:/knowledge/system_reference:ro
      - ./knowledge/personas:/knowledge/personas:ro
      - ./knowledge/penpal:/knowledge/penpal:rw
      - ../gaia-instance/gaia-models:/models:rw
      - gaia-candidate-shared:/shared:rw
      - ../gaia-instance/logs:/logs:rw

    environment:
      - PYTHONPATH=/app:/gaia-common
      - GAIA_ENV=development
      - GAIA_LOG_DIR=/logs
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True

    ports:
      - "8768:8766"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8766/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    profiles:
      - full
      - study-candidate

  # ═══════════════════════════════════════════════════════════════════════════
  # gaia-doctor-candidate: The Immune System (candidate)
  # ═══════════════════════════════════════════════════════════════════════════
  gaia-doctor-candidate:
    build:
      context: .
      dockerfile: ./candidates/gaia-doctor/Dockerfile
    image: localhost:5000/gaia-doctor-candidate:local
    container_name: gaia-doctor-candidate
    hostname: gaia-doctor-candidate
    restart: "no"

    environment:
      - POLL_INTERVAL=30
      - FAILURE_THRESHOLD=${DOCTOR_FAILURE_THRESHOLD:-2}
      - RESTART_COOLDOWN=${DOCTOR_RESTART_COOLDOWN:-300}
      - COMPOSE_PROJECT_NAME=gaia_project
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MONKEY_ENDPOINT=${MONKEY_ENDPOINT:-http://gaia-monkey:6420}
      - CORE_ENDPOINT=${CORE_ENDPOINT:-http://gaia-core:6415}
      - ES_ENDPOINT=${ES_ENDPOINT:-http://elasticsearch:9200}
      - SHARED_DIR=/candidate-shared
      - COGNITIVE_MONITOR_INTERVAL=${COGNITIVE_MONITOR_INTERVAL:-300}
      # Disable restarts and sovereign promotion — candidate observes only
      - DOCTOR_DRY_RUN=1

    volumes:
      # Docker socket (read-only — candidate should NOT restart containers)
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Docker CLI + compose plugin
      - /usr/bin/docker:/usr/bin/docker:ro
      - /usr/lib/docker/cli-plugins/docker-compose:/usr/lib/docker/cli-plugins/docker-compose:ro
      # Project root for code monitoring (read-only)
      - .:/gaia/GAIA_Project:ro
      # Candidate shared state (separate from production)
      - gaia-candidate-shared:/candidate-shared:rw

    group_add:
      - "${DOCKER_GID:-962}"

    ports:
      - "6421:6419"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6419/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  gaia-candidate-shared:
  gaia-candidate-sandbox:

networks:
  default:
    name: gaia-network
    external: true
