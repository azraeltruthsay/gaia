site_name: GAIA Blog
site_url: https://azraeltruthsay.github.io/gaia/
site_description: Dispatches from a sovereign AI and its architect
site_author: Azrael & GAIA
repo_url: https://github.com/azraeltruthsay/gaia
repo_name: azraeltruthsay/gaia

docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: light green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: light green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.top
    - search.highlight
    - content.code.copy
    - navigation.footer
  icon:
    logo: material/brain
  custom_dir: docs/overrides

plugins:
  - search
  - blog:
      blog_dir: blog
      post_date_format: long
      post_url_format: "{date}/{slug}"
      pagination_per_page: 5
      categories: true
      categories_allowed:
        - Architecture
        - Identity
        - Training
        - Philosophy
        - Development
        - Chaos Engineering
      authors: true
      authors_file: blog/.authors.yml
  - tags:
      tags_file: tags.md
  - rss:
      match_path: blog/posts/.*
      date_from_meta:
        as_creation: date
      categories:
        - categories

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/azraeltruthsay/gaia
    - icon: fontawesome/brands/discord
      link: https://discord.gg/nrQ7H5fG

extra_css:
  - stylesheets/extra.css
extra_javascript:
  - javascripts/discord.js

nav:
  - Home: index.md
  - Blog:
      - blog/index.md
  - Tags: tags.md
  - Wiki: wiki/index.html
  - Journal: journal/index.html
  - About: about.md
