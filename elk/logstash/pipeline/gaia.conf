# Logstash pipeline for GAIA service logs
# Receives logs via Filebeat, parses JSON, indexes to Elasticsearch

input {
  beats {
    port => 5044
  }
}

filter {
  # Parse JSON-formatted log lines from GAIA services
  if [message] =~ /^\{/ {
    json {
      source => "message"
      target => "gaia"
      skip_on_invalid_json => true
    }

    if [gaia][level] {
      mutate {
        add_field => { "log_level" => "%{[gaia][level]}" }
      }
    }

    if [gaia][service] {
      mutate {
        add_field => { "gaia_service" => "%{[gaia][service]}" }
      }
    }
  }

  # Extract service name from container name (e.g., "gaia-core" from container)
  if [container][name] {
    mutate {
      add_field => { "service_name" => "%{[container][name]}" }
    }
  }

  # Parse standard Python log format as fallback
  if ![gaia] and [message] =~ /^\d{4}-\d{2}-\d{2}/ {
    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:log_timestamp}\s+\[?%{DATA:logger_name}\]?\s+%{LOGLEVEL:log_level}[:\s]+%{GREEDYDATA:log_message}"
      }
      overwrite => ["log_level"]
      tag_on_failure => ["_gaia_parse_failed"]
    }
  }

  # Normalize log levels
  if [log_level] {
    mutate {
      uppercase => ["log_level"]
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "gaia-logs-%{+YYYY.MM.dd}"
  }
}
