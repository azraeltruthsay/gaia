# Filebeat configuration for GAIA
# Collects Docker container logs and forwards to Logstash

filebeat.inputs:
  - type: filestream
    id: docker-logs
    paths:
      - "/var/lib/docker/containers/*/*.log"
    parsers:
      - ndjson:
          target: ""
          overwrite_keys: true
          add_error_key: true
    processors:
      - add_docker_metadata:
          host: "unix:///var/run/docker.sock"

output.logstash:
  hosts: ["logstash:5044"]

# Logging
logging.level: warning
logging.to_files: false
