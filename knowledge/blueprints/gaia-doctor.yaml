dependencies:
  services:
  - id: gaia-orchestrator
    role: gpu_status_enrichment
    required: false
    fallback: null
  - id: gaia-core
    role: cognitive_similarity_inference
    required: false
    fallback: null
  - id: gaia-monkey
    role: serenity_management
    required: false
    fallback: null
  volumes:
  - name: gaia-shared
    access: rw
    purpose: Status files, alarms, cognitive results, surgeon config, hash registry
    mount_path: /shared
  - name: compose
    access: ro
    purpose: Docker compose files for HA overlay restarts
    mount_path: /compose
  - name: project_root
    access: ro
    purpose: Source file hashing for dissonance detection
    mount_path: /gaia/GAIA_Project
  external_apis: []

source_files:
- path: gaia-doctor/doctor.py
  role: entrypoint
  file_type: python
- path: gaia-doctor/cognitive_test_battery.py
  role: core_logic
  file_type: python
- path: gaia-doctor/Dockerfile
  role: config
  file_type: dockerfile

failure_modes:
- condition: Monitored service unreachable
  response: Increments consecutive failure counter; triggers restart after threshold (default 2)
  severity: degraded
  auto_recovers: true
- condition: Docker socket unavailable
  response: Cannot restart containers; observe-only mode
  severity: partial
  auto_recovers: false
- condition: gaia-orchestrator unavailable
  response: GPU status enrichment unavailable; core health monitoring continues
  severity: degraded
  auto_recovers: true
- condition: Production restart circuit breaker tripped
  response: Stops restarting production services after max restarts in rolling window (2/30min)
  severity: partial
  auto_recovers: true

intent:
  purpose: >
    The persistent immune system of GAIA. Continuously monitors all services via health
    polling, detects failures, and automatically restarts crashed containers with circuit
    breaker protection. Runs cognitive test batteries to validate model alignment. Manages
    surgeon approval queue for human-in-the-loop repair decisions. Intentionally stdlib-only
    to minimize its own failure surface — the immune system must be the last thing to go down.

  design_decisions:
  - stdlib-only — no external dependencies, minimal failure surface
  - Separate from gaia-monkey (passive monitoring vs active adversarial testing)
  - Circuit breaker prevents restart storms (max 2 production restarts per 30 minutes)
  - Maintenance mode suppresses restarts during planned work
  - Surgeon approval queue enables human oversight of automated repairs
  - Cognitive test battery validates model alignment without requiring inference dependencies
  - File hash registry for atomic change detection across services
  - Dry-run mode for candidate doctor shadowing production

  open_questions: []
  cognitive_role: The Immune System

