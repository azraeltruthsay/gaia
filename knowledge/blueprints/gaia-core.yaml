failure_modes:
- condition: gaia-prime unavailable
  response: Falls back to Groq API; if Groq unavailable, falls back to local GGUF
    model
  severity: degraded
  auto_recovers: true
- condition: gaia-mcp unavailable
  response: Tool calls skipped; responds with capability_unavailable in packet
  severity: degraded
  auto_recovers: true
- condition: All inference backends unavailable
  response: Returns error packet to gaia-web; session preserved for retry
  severity: partial
  auto_recovers: false
intent:
  purpose: 'The cognitive engine of GAIA. Runs the full reasoning loop: intent detection,
    tool routing, multi-step reflection, and response generation. Deliberately CPU-only
    to allow gaia-prime and gaia-study to share the GPU without interrupting cognition.
    All inference is delegated to gaia-prime, with graceful fallback chains preserving
    uptime across backend failures.

    '
  design_decisions:
  - Model-to-model cascade routing (Nano-Refiner triage → Operator → Prime)
  - CPU-only runtime enables GPU handoffs between prime and study without blocking
    the cognition loop
  - Falls back through groq → gguf rather than hard-failing — uptime over raw capability
  - gaia-web owns output routing so core remains interface-agnostic
  - 'Four-tier memory: session (short-term), semantic codex (mid-term), vector store
    (long-term), prime.md checkpoint (sleep continuity)'
  - Guided decoding via json-architect LoRA adapter for reliable structured output
    from smaller models
  - Sleep/wake cognitive continuity — LLM-generated checkpoint captures introspective
    state, consumed-sentinel prevents stale injection
  - Parallel wake strategy — GPU reclaim and checkpoint load happen concurrently for
    faster wake
  - Human-in-the-loop approval flow for destructive tool calls via gaia-mcp /request_approval
  open_questions: []
  cognitive_role: The Brain
