  direction: inbound
  transport:
    type: http_rest
    path: /slots
    method: GET
    input_schema: null
    output_schema: null
  description: KV cache slot status — used by gaia-doctor for cache pressure monitoring.
  status: active

dependencies:
  services: []
  volumes:
  - name: models
    access: ro
    purpose: GGUF model weights for llama-server
    mount_path: /models
  external_apis: []

source_files:
- path: gaia-nano/Dockerfile
  role: entrypoint
  file_type: dockerfile

failure_modes:
- condition: GPU unavailable
  response: Falls back to CPU-only GGUF inference (degraded latency)
  severity: degraded
  auto_recovers: true
- condition: Model file missing or corrupt
  response: llama-server fails to start; container enters crash loop
  severity: fatal
  auto_recovers: false

intent:
  purpose: >
    The reflexive triage layer of GAIA. Runs a tiny 0.8B Qwen model via llama-server
    for sub-second classification (SIMPLE/COMPLEX routing) and transcript cleanup.
    Intentionally minimal — no application code, just llama-server with a GGUF model.
    GPU primary with CPU fallback for resilience.

  design_decisions:
  - llama-server directly — no Python wrapper, minimal attack surface
  - OpenAI-compatible API for drop-in integration with gaia-core model clients
  - GPU primary for speed, CPU fallback for resilience
  - 0.8B parameter model chosen for sub-second latency on triage tasks
  - KV cache /slots endpoint enables external pressure monitoring by doctor

  open_questions: []
  cognitive_role: The Reflex

