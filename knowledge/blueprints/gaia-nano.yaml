id: gaia-nano
version: '1.0'
role: The Reflex (Nano Triage)
service_status: live
runtime:
  port: 8080
  base_image: null
  gpu: true
  startup_cmd: llama-server --model /models/nano.gguf --port 8080 --host 0.0.0.0
  health_check: curl -f http://localhost:8080/health
  gpu_count: 1
  user: null
  dockerfile: gaia-nano/Dockerfile
  compose_service: gaia-nano
  security: null

interfaces:
- id: health
  direction: inbound
  transport:
    type: http_rest
    path: /health
    method: GET
    input_schema: null
    output_schema: null
  description: Container health check endpoint (llama-server built-in).
  status: active

- id: chat_completions
  direction: inbound
  transport:
    type: http_rest
    path: /v1/chat/completions
    method: POST
    input_schema: null
    output_schema: null
  description: OpenAI-compatible chat completions endpoint. Used by gaia-core for Nano triage classification and transcript cleanup.
  status: active

- id: completions
  direction: inbound
  transport:
    type: http_rest
    path: /v1/completions
    method: POST
    input_schema: null
    output_schema: null
