id: gaia-web
version: '0.5'
role: The Face (Web/Discord Gateway)
service_status: live
runtime:
  port: 6414
  base_image: python:3.11-slim
  gpu: false
  startup_cmd: uvicorn gaia_web.main:app --host 0.0.0.0 --port 6414
  health_check: curl -f http://localhost:6414/health
  user: ${UID}:${GID}
  dockerfile: gaia-web/Dockerfile
  compose_service: gaia-web
interfaces:
- id: health
  direction: inbound
  description: Container health check endpoint.
  status: active
  transport:
    type: http_rest
    path: /health
    method: GET
- id: root
  direction: inbound
  description: Root endpoint — returns service info and available endpoints for discovery.
  status: active
  transport:
    type: http_rest
    path: /
    method: GET
- id: queue_status
  direction: inbound
  description: Message queue telemetry — queued count, wake signal state, oldest message
    age.
  status: active
  transport:
    type: http_rest
    path: /queue/status
    method: GET
- id: process_user_input
  direction: inbound
  description: 'Primary user input entry point. Receives text from web/Discord, converts
    to CognitionPacket, sends to gaia-core. Sleep-aware: enqueues + wakes + polls
    if GAIA is asleep.'
  status: active
  transport:
    type: http_rest
    path: /process_user_input
    method: POST
- id: presence
  direction: inbound
  description: Update Discord bot presence (status dot + activity text). Called by
    gaia-core's SleepCycleLoop.
  status: active
  transport:
    type: http_rest
    path: /presence
    method: POST
- id: output_router
  direction: inbound
  description: Route completed packets to output destinations (Discord channels, DMs,
    logs). Called by gaia-core after response generation.
  status: active
  transport:
    type: http_rest
    path: /output_router
    method: POST
- id: core_process_packet
  direction: outbound
  description: Send CognitionPacket to gaia-core for cognitive processing.
  status: active
  transport:
    type: http_rest
    path: /process_packet
    method: POST
- id: core_sleep_distracted_check
  direction: outbound
  description: Check gaia-core sleep state before enqueueing messages.
  status: active
  transport:
    type: http_rest
    path: /sleep/distracted-check
    method: GET
- id: core_sleep_wake
  direction: outbound
  description: Send wake signal to gaia-core. Triggers ASLEEP -> WAKING transition.
  status: active
  transport:
    type: http_rest
    path: /sleep/wake
    method: POST
- id: core_sleep_status
  direction: outbound
  description: Poll gaia-core sleep status in wait_for_active loop.
  status: active
  transport:
    type: http_rest
    path: /sleep/status
    method: GET
- id: discord_bot
  direction: outbound
  description: discord.py bot instance — sends/receives Discord messages in background
    thread.
  status: active
  transport:
    type: direct_call
    symbol: gaia_web.discord_interface.DiscordInterface
- id: audio_listener_ingest
  direction: inbound
  transport:
    type: http_rest
    path: /api/audio/listener/ingest
    method: POST
    input_schema: null
    output_schema: null
  description: Forward accumulated transcript text to gaia-core for processing.
  status: active
- id: audio_listener_start
  direction: inbound
  transport:
    type: http_rest
    path: /api/audio/listener/start
