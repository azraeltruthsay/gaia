architecture:
  components:
  - id: http_gateway
    label: HTTP Gateway
    description: 'FastAPI application serving the Mission Control dashboard, REST
      API, and proxy endpoints. Routes user input to gaia-core, serves static files,
      proxies orchestrator/core status for the dashboard, and handles presence updates
      from gaia-core for Discord status sync.

      '
    source_files:
    - gaia-web/gaia_web/main.py
    key_classes: []
    key_functions:
    - process_user_input(user_input)
    - update_presence(body)
    - output_router(packet)
    - system_status_proxy()
    - system_sleep_proxy()
    - dashboard_redirect()
    - queue_status()
    exposes_interfaces:
    - process_input
    - health
    - root
    - presence
    - output_route
    - queue_status
  - id: discord_gateway
    label: Discord Gateway
    description: 'Discord.py bot integration. Manages the WebSocket connection to
      Discord, handles incoming messages, splits long responses to fit Discord''s
      2000-char limit, and updates bot presence based on GAIA''s cognitive state (active/asleep/drowsy).

      '
    source_files:
    - gaia-web/gaia_web/discord_interface.py
    key_classes:
    - DiscordInterface
    key_functions:
    - start_discord_bot()
    - stop_discord_bot()
    - is_bot_ready()
    - DiscordInterface._split_message()
  - id: message_queue
    label: Sleep-Aware Message Queue
    description: 'Buffers incoming messages when GAIA is asleep or drowsy. Sends wake
      signals to gaia-core, waits for active state, then drains the queue. Prevents
      message loss during sleep transitions and provides queue depth visibility via
      status endpoint.

      '
    source_files:
    - gaia-web/gaia_web/queue/message_queue.py
    key_classes:
    - QueuedMessage
    - MessageQueue
    key_functions:
    - MessageQueue.enqueue()
    - MessageQueue.dequeue()
    - MessageQueue.wait_for_active()
    - MessageQueue._send_wake_signal()
  - id: blueprint_api
    label: Blueprint API
    description: 'Read-only REST endpoints exposing the blueprint graph, service list,
      detail JSON, and rendered markdown. Powers the Mission Control dashboard''s
      graph visualization and blueprint detail panel. Loads from both live and candidate
      blueprint directories.

      '
    source_files:
    - gaia-web/gaia_web/routes/blueprints.py
    key_functions:
    - get_graph()
    - list_blueprints()
    - get_blueprint_detail()
    - get_blueprint_markdown()
    exposes_interfaces:
    - blueprint_graph
    - blueprint_list
    - blueprint_detail
    - blueprint_markdown
  edges:
  - from_component: http_gateway
    to_component: discord_gateway
    label: starts/stops bot on app lifecycle
    data_flow: bot_token, core_endpoint
  - from_component: http_gateway
    to_component: message_queue
    label: creates queue, checks state before routing
    data_flow: user messages, sleep state
  - from_component: discord_gateway
    to_component: message_queue
    label: enqueues messages when asleep/drowsy
    data_flow: QueuedMessage (content, channel, author)
  - from_component: discord_gateway
    to_component: http_gateway
    label: forwards messages to process_user_input
    data_flow: user_input text
  - from_component: message_queue
    to_component: http_gateway
    label: drains queued messages after wake
    data_flow: QueuedMessage → process_user_input
