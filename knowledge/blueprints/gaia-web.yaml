failure_modes:
- condition: gaia-core unavailable
  response: HTTP 503/504 returned to client; timeout after 300s
  severity: fatal
  auto_recovers: false
- condition: Discord bot token missing or invalid
  response: Discord integration disabled; web input processing still works
  severity: degraded
  auto_recovers: false
- condition: Discord bot websocket down
  response: /output_router returns 503 for Discord sends; bot auto-reconnects via
    discord.py
  severity: degraded
  auto_recovers: true
- condition: Sleep/wake queue timeout
  response: wait_for_active times out; user gets timeout error
  severity: degraded
  auto_recovers: true
- condition: Discord message send fails (permissions, deleted channel)
  response: /output_router returns 500; response lost (not retried)
  severity: degraded
  auto_recovers: false
intent:
  purpose: 'The user-facing gateway of GAIA. Handles all external interactions: web
    form submissions, Discord messaging (mentions + DMs), and output routing back
    to endpoints. Integrates sleep/wake coordination: enqueues messages while GAIA
    sleeps, wakes on first message, polls for active state before returning response.

    '
  cognitive_role: The Face
  design_decisions:
  - FastAPI + uvicorn for concurrent Discord and web traffic
  - Discord bot runs in background thread (separate event loop) to avoid blocking
    HTTP handlers
  - Sleep-aware message queue holds incoming messages while GAIA sleeps, sends wake
    signal, waits for active
  - 'Direct Discord bot control: /presence and /output_router directly manipulate
    discord.py bot'
  - Message splitting respects Discord's 2000-char limit while preferring newline/word
    boundaries
  - gaia-core is the single source of truth for sleep state; web polls rather than
    caches
  - 'Graceful degradation: Discord unavailability doesn''t block web API'
  open_questions:
  - Should message queue persistence survive service restart, or is in-memory-only
    acceptable?
  - Is MessageQueue polling interval (1.5s default) optimal, or should it be configurable?
  - Should /output_router handle async retries for failed Discord sends?
