service: gaia-nano
port: 8080
host_port: 8090
role: "DEPRECATED — bare TCP passthrough, not an inference service"
protocol: tcp

notes: |
  gaia-nano is deprecated (Sovereign Duality, 2026-04+). Core handles all
  triage directly — see CLAUDE.md "Deprecated: gaia-nano".

  Everything below this line in the old contract (GAIA Engine dual-mode
  inference, polygraph, LoRA adapters, /model/load, /device/gpu, etc.) was
  fictional against actual running state and has been removed — kept the
  file itself only so nothing that still `depends_on: gaia-nano` breaks.

  Current reality (docker-compose.yml:180-195): gaia-nano is
  `image: alpine/socat:latest`, a bare TCP proxy —
  `TCP-LISTEN:8080,fork,reuseaddr TCP:gaia-core:8092` — forwarding
  connections to gaia-core's embedded engine. No model, no GPU, no
  endpoints of its own. Restore the original engine container to bring
  Nano back as a real tier; until then this contract has nothing to
  document beyond the passthrough.

provides: []
consumes: []

deploy:
  gpu: false
