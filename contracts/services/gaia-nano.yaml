notes: |
  gaia-nano was deprecated in Sovereign Duality (2026-04+) and its last
  remnant — an alpine/socat TCP passthrough forwarding :8080 to
  gaia-core:8092 — was removed from docker-compose.yml on 2026-07-08
  (bead vjdf). The `gaia-nano` DNS name no longer exists on gaia-net.

  All former NANO_* consumers now target Core's embedded engine directly:
    - inside gaia-core:        http://localhost:8092
    - from other containers:   http://gaia-core:8092
  The speculative-reflex pre-flight in gaia-core/main.py (the last code
  path that generated user-facing replies under the nano label) was
  deleted in the same change — every turn now runs the full pipeline.

  This file is kept as a tombstone so greps for "nano" land here instead
  of resurrecting the tier by accident. Remaining name-scrub (orchestrator
  tier bookkeeping, lifecycle TierExpectations, prompt tier labels) is
  tracked in the phase-3 follow-up bead.

