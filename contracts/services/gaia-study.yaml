service: gaia-study
port: 8766
role: "The Subconscious — QLoRA subprocess training, vector indexing (SOLE WRITER)"
protocol: http
framework: FastAPI

notes: |
  gaia-study uses multiprocessing with spawn start method for training. This
  ensures fresh CUDA contexts per child process, with guaranteed VRAM release
  on exit. The parent process never imports torch.

provides:
  # ── Health & Status ────────────────────────────────────────────────
  - endpoint: /health
    method: GET
    description: "Health check."
    consumers: [gaia-doctor]

  - endpoint: /status
    method: GET
    description: "Service status including loaded indexes."
    consumers: [gaia-web]

  # ── Vector Index Management ────────────────────────────────────────
  - endpoint: /index/build
    method: POST
    description: "Build or rebuild a vector index (background task)."
    request_schema:
      fields:
        knowledge_base_name: string
        force_rebuild: bool (default false)
    consumers: [gaia-core]

  - endpoint: /index/add
    method: POST
    description: "Add a single document to the index."
    request_schema:
      fields:
        knowledge_base_name: string
        file_path: string
    consumers: [gaia-core]

  - endpoint: /index/query
    method: POST
    description: "Query the vector index for similar documents."
    request_schema:
      fields:
        knowledge_base_name: string
        query: string
        top_k: int (default 5)
    consumers: [gaia-core]

  - endpoint: /index/{knowledge_base_name}/status
    method: GET
    description: "Get status of a specific index."
    consumers: [gaia-core]

  - endpoint: /index/{knowledge_base_name}/refresh
    method: POST
    description: "Refresh the index from disk."
    consumers: [gaia-core]

  # ── GPU Handoff (called by orchestrator) ───────────────────────────
  - endpoint: /study/gpu-ready
    method: POST
    description: "Signal from orchestrator that GPU is available for training."
    consumers: [gaia-orchestrator]

  - endpoint: /study/gpu-release
    method: POST
    description: "Request from orchestrator to release GPU. Kills training subprocess."
    consumers: [gaia-orchestrator]

  # ── Training Subprocess Monitoring ─────────────────────────────────
  - endpoint: /study/training/status
    method: GET
    description: "Detailed training status including subprocess info and progress file."
    consumers: [gaia-orchestrator, gaia-web]

  - endpoint: /study/training/kill
    method: POST
    description: "Force-kill the training subprocess (last resort)."
    consumers: [gaia-orchestrator]

  # ── Study Mode / LoRA Training ─────────────────────────────────────
  - endpoint: /study/start
    method: POST
    description: "Start a study/training session to create a LoRA adapter from documents."
    request_schema:
      fields:
        adapter_name: string
        documents: list of string (paths)
        tier: int (1-3, default 3)
        pillar: string (default general)
        description: string
        rank: int (1-64, default 8)
        alpha: int (1-128, default 16)
        target_modules: list of string (default [q_proj, v_proj])
        max_steps: int (1-1000, default 100)
        num_train_epochs: int (optional, overrides max_steps)
        target_loss: float (default 0.05)
        convergence_patience: int (default 3)
        resume_from: string (optional)
        activation_triggers: list of string
        tags: list of string
    consumers: [gaia-core, gaia-doctor]

  - endpoint: /study/status
    method: GET
    description: "Get current study mode status."
    consumers: [gaia-web, gaia-orchestrator]

  - endpoint: /study/cancel
    method: POST
    description: "Cancel an in-progress training session."
    consumers: [gaia-web]

  # ── Adapter Management ─────────────────────────────────────────────
  - endpoint: /adapters
    method: GET
    description: "List available LoRA adapters (optional tier filter)."
    consumers: [gaia-core, gaia-web]

  - endpoint: /adapters/load
    method: POST
    description: "Load a LoRA adapter and notify gaia-core."
    request_schema:
      fields:
        adapter_name: string
        tier: int (1-3)
    consumers: [gaia-core]

  - endpoint: /adapters/unload
    method: POST
    description: "Unload a LoRA adapter and notify gaia-core."
    request_schema:
      fields:
        adapter_name: string
        tier: int (1-3)
    consumers: [gaia-core]

  - endpoint: /adapters/{adapter_name}
    method: GET
    description: "Get detailed info about a specific adapter."
    consumers: [gaia-core]

  - endpoint: /adapters/{adapter_name}
    method: DELETE
    description: "Delete a LoRA adapter."
    consumers: [gaia-core]

  # ── Self-Awareness Pipeline ────────────────────────────────────────
  - endpoint: /pipeline/run
    method: POST
    description: "Launch the self-awareness pipeline as a background subprocess."
    request_schema:
      fields:
        dry_run: bool
        skip_nano: bool
        skip_smoke: bool
        stage: string (optional)
        resume: bool
    consumers: [gaia-doctor, gaia-web]

  - endpoint: /pipeline/status
    method: GET
    description: "Check if a pipeline subprocess is running, with state file contents."
    consumers: [gaia-doctor, gaia-web]

consumes:
  - service: gaia-core
    endpoint: /model/adapters/notify
    method: POST
    protocol: http
    port: 6415
    description: "Notify core of adapter load/unload"

  - service: gaia-core
    endpoint: /model/release
    method: POST
    protocol: http
    port: 6415
    description: "Release embedded model before GGUF overwrite"

  - service: gaia-core
    endpoint: /model/reload
    method: POST
    protocol: http
    port: 6415
    description: "Reload embedded model after deploy"

environment:
  KNOWLEDGE_DIR: "/knowledge"
  VECTOR_STORE_PATH: "/vector_store"
  MODELS_DIR: "/models"
  WARM_POOL_DIR: "/warm_pool"
  BASE_MODEL_PATH: "/warm_pool/Huihui-Qwen3-8B-GAIA-Prime-adaptive"
  CORE_ENDPOINT: "http://gaia-core:6415"

volumes:
  - path: /gaia-common
    mode: ro
    purpose: "Shared library"
  - path: /app
    mode: rw
    purpose: "Service source code"
  - path: /knowledge
    mode: rw
    purpose: "Knowledge base (FULL ACCESS for indexing)"
  - path: /vector_store
    mode: rw
    purpose: "Vector indexes (SOLE WRITER)"
  - path: /models
    mode: rw
    purpose: "Model files (WRITE for LoRA adapters)"
  - path: /warm_pool
    mode: ro
    purpose: "Tmpfs-backed warm pool for base model loads"
  - path: /logs
    mode: rw
    purpose: "Consolidated logs"
  - path: /shared
    mode: rw
    purpose: "Shared state (pipeline state)"

health_check:
  endpoint: /health
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 60s

deploy:
  gpu: true
  gpu_count: all
  memory_limit: 48G
